<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gabarit 12 Colonnes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .col {
            background-color: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
        }

        /* Colonnes dynamiques */
        .col-1  { grid-column: span 1; }
        .col-2  { grid-column: span 2; }
        .col-3  { grid-column: span 3; }
        .col-4  { grid-column: span 4; }
        .col-5  { grid-column: span 5; }
        .col-6  { grid-column: span 6; }
        .col-7  { grid-column: span 7; }
        .col-8  { grid-column: span 8; }
        .col-9  { grid-column: span 9; }
        .col-10 { grid-column: span 10; }
        .col-11 { grid-column: span 11; }
        .col-12 { grid-column: span 12; }

        /* Responsive */
        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
            .col {
                grid-column: span 1 !important;
            }
        }

        footer {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

    </style>
</head>
<body>

<header>
</header>

<div class="container">

    <div class="row">
        <div class="col col-12">col-12</div>
    </div>

    <div class="row">
        <div class="col col-6">col-6</div>
        <div class="col col-6">col-6</div>
    </div>

    <div class="row">
        <div class="col col-4">col-4</div>
        <div class="col col-4">col-4</div>
        <div class="col col-4">col-4</div>
    </div>

    <div class="row">
        <div class="col col-3">col-3</div>
        <div class="col col-3">col-3</div>
        <div class="col col-3">col-3</div>
        <div class="col col-3">col-3</div>
    </div>

    <div class="row">
        <div class="col col-8">col-8</div>
        <div class="col col-4">col-4</div>
    </div>

</div>

<footer>
    <p>Footer - Grille 12 colonnes</p>
</footer>

</body>
</html>
