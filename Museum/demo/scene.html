<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musée virtuel - Three.js</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.55);
      color: white;
      text-align: center;
      z-index: 10;
      user-select: none;
      cursor: pointer;
    }

    #overlay .box {
      max-width: 520px;
      padding: 24px 28px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      background: rgba(20,20,20,0.65);
      backdrop-filter: blur(8px);
    }

    #overlay h1 { margin: 0 0 12px; font-size: 22px; }
    #overlay p  { margin: 6px 0; line-height: 1.45; font-size: 15px; opacity: 0.95; }

    #hint, #cameraPos, #fps {
      position: fixed;
      left: 12px;
      z-index: 5;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      pointer-events: none;
      font-family: monospace;
    }

    #hint      { bottom: 12px; font-family: sans-serif; }
    #cameraPos { bottom: 56px; }
    #fps       { bottom: 100px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="overlay">
    <div class="box">
      <h1>Clique pour entrer dans la visite</h1>
      <p>Déplacement : ZQSD ou WASD</p>
      <p>Altitude : flèches Haut / Bas</p>
      <p>Souris : regarder autour</p>
      <p>Échap : quitter le mode caméra libre</p>
      <p>Les collisions peuvent être activées/désactivées avec la touche C.</p>
    </div>
  </div>
  <div id="hint">Caméra libre + collisions activées</div>
  <div id="cameraPos"></div>
  <div id="fps"></div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader }         from "three/addons/loaders/GLTFLoader.js";
    import { DRACOLoader }        from "three/addons/loaders/DRACOLoader.js";
    import { PointerLockControls} from "three/addons/controls/PointerLockControls.js";

    // ─── DOM refs (une seule fois) ───────────────────────────────────────────
    const overlay      = document.getElementById("overlay");
    const hint         = document.getElementById("hint");
    const cameraPosDiv = document.getElementById("cameraPos");
    const fpsDiv       = document.getElementById("fps");

    // ─── Compteur FPS ────────────────────────────────────────────────────────
    let fpsFrameCount = 0;
    let fpsLastTime   = performance.now();

    // ─── Constantes physiques ────────────────────────────────────────────────
    const MOVE_SPEED     = 4.5;
    const VERTICAL_SPEED = 3.0;
    const SKIN           = 0.35;   // marge de sécurité collision (mètres)
    const HEIGHT         = 1.7;    // hauteur joueur (mètres)

    // Offsets verticaux pour le raycaster (tête, milieu, pieds)
    //const V_OFFSETS = [0, -HEIGHT * 0.5, -HEIGHT]; // Collisions précises mais lourdes
    const V_OFFSETS = [-HEIGHT * 0.5];

    // Directions cardinales (réutilisées, jamais recréées)
    const DIR = {
      px: new THREE.Vector3( 1,  0,  0),
      nx: new THREE.Vector3(-1,  0,  0),
      pz: new THREE.Vector3( 0,  0,  1),
      nz: new THREE.Vector3( 0,  0, -1),
      py: new THREE.Vector3( 0,  1,  0),
      ny: new THREE.Vector3( 0, -1,  0),
    };

    // ─── État global ─────────────────────────────────────────────────────────
    let scene, camera, renderer, controls, clock;
    const collisionMeshes = [];
    const raycaster       = new THREE.Raycaster();
    raycaster.firstHitOnly = true;
    let collisionsEnabled = true;

    // Vecteurs de travail pré-alloués (évite du GC en boucle d'animation)
    const _direction  = new THREE.Vector3();
    const _right      = new THREE.Vector3();
    const _horizontal = new THREE.Vector3();
    const _origin     = new THREE.Vector3();

    const keys = {
      forward: false, backward: false,
      left:    false, right:    false,
      up:      false, down:     false,
    };

    // ─── Collision helpers ───────────────────────────────────────────────────

    /** Renvoie true si un obstacle se trouve à moins de `dist` m dans `dir`. */
    function blockedInDirection(origin, dir, dist) {
      raycaster.far = dist;
      for (const vOff of V_OFFSETS) {
        _origin.set(origin.x, origin.y + vOff, origin.z);
        raycaster.set(_origin, dir);
        if (raycaster.intersectObjects(collisionMeshes, false).length > 0) return true;
      }
      return false;
    }

    /** Tente de déplacer `pos` sur l'axe `axis` de `delta`. Retourne la nouvelle position. */
    function tryMoveAxis(pos, axis, delta) {
      if (delta === 0) return pos;

      const dir =
        axis === "x" ? (delta > 0 ? DIR.px : DIR.nx) :
        axis === "z" ? (delta > 0 ? DIR.pz : DIR.nz) :
                       (delta > 0 ? DIR.py : DIR.ny);

      if (collisionsEnabled && blockedInDirection(pos, dir, SKIN + Math.abs(delta))) {
        return pos;
      }

      const next = pos.clone();
      next[axis] += delta;
      return next;
    }

    // ─── Initialisation ──────────────────────────────────────────────────────

    function init() {
      // Scène
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);
      scene.fog        = new THREE.Fog(0x111111, 12, 60);

      // Caméra
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputEncoding        = THREE.sRGBEncoding;
      renderer.physicallyCorrectLights = true;
      renderer.toneMapping           = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure   = 1.1;
      renderer.shadowMap.enabled     = true;
      renderer.shadowMap.type        = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      // Contrôles
      controls = new PointerLockControls(camera, document.body);
      controls.getObject().position.set(0, HEIGHT, 0);
      scene.add(controls.getObject());

      clock = new THREE.Clock();

      // Lumières
      scene.add(new THREE.AmbientLight(0xffffff, 0.35));
      scene.add(new THREE.HemisphereLight(0xffffff, 0x222233, 0.8));

      const sun = new THREE.DirectionalLight(0xffffff, 2.0);
      sun.position.set(5, 10, 7);
      sun.castShadow = true;
      scene.add(sun);

      // Chargement panorama (après que scene est défini)
      new THREE.TextureLoader().load("panorama.png", (tex) => {
        tex.mapping    = THREE.EquirectangularReflectionMapping;
        scene.background = tex;
      });

      // Chargement modèle GLB — UNE seule fois
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath(
        "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/"
      );

      const gltfLoader = new GLTFLoader();
      gltfLoader.setDRACOLoader(dracoLoader);

      gltfLoader.load(
        "sponza-palace/source/scene.glb",
        (gltf) => {
          const model = gltf.scene;
          scene.add(model);
          model.updateMatrixWorld(true);

          collisionMeshes.length = 0;
          model.traverse((obj) => {
            if (obj.isMesh) {
              obj.updateMatrixWorld(true);
              collisionMeshes.push(obj);
            }
          });

          console.log(`Collision meshes chargés : ${collisionMeshes.length}`);
        },
        undefined,
        (err) => console.error("Erreur de chargement GLB :", err)
      );

      // Événements
      document.addEventListener("keydown", onKeyDown);
      document.addEventListener("keyup",   onKeyUp);
      document.addEventListener("click",   () => { if (!controls.isLocked) controls.lock(); });
      controls.addEventListener("lock",   () => { overlay.style.display = "none"; });
      controls.addEventListener("unlock", () => { overlay.style.display = "grid"; });
      window.addEventListener("resize", onWindowResize);

      animate();
    }

    // ─── Input ───────────────────────────────────────────────────────────────

    function onKeyDown(e) {
      switch (e.code) {
        case "KeyZ": case "KeyW": keys.forward  = true;  break;
        case "KeyS":              keys.backward = true;  break;
        case "KeyQ": case "KeyA": keys.left     = true;  break;
        case "KeyD":              keys.right    = true;  break;
        case "ArrowUp":   keys.up   = true;  e.preventDefault(); break;
        case "ArrowDown": keys.down = true;  e.preventDefault(); break;
        case "KeyC":
          collisionsEnabled = !collisionsEnabled;
          hint.innerText = collisionsEnabled
            ? "Caméra libre + collisions activées"
            : "Caméra libre + collisions désactivées";
          break;
      }
    }

    function onKeyUp(e) {
      switch (e.code) {
        case "KeyZ": case "KeyW": keys.forward  = false; break;
        case "KeyS":              keys.backward = false; break;
        case "KeyQ": case "KeyA": keys.left     = false; break;
        case "KeyD":              keys.right    = false; break;
        case "ArrowUp":   keys.up   = false; e.preventDefault(); break;
        case "ArrowDown": keys.down = false; e.preventDefault(); break;
      }
    }

    // ─── Boucle d'animation ──────────────────────────────────────────────────

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (controls.isLocked) {
        const obj     = controls.getObject();
        const current = obj.position.clone();

        // Direction regard (horizontale)
        controls.getDirection(_direction);
        _direction.y = 0;
        _direction.normalize();

        // Vecteur droit
        _right.crossVectors(_direction, obj.up).normalize();

        let moveX = 0, moveZ = 0, moveY = 0;
        if (keys.forward)  moveZ += 1;
        if (keys.backward) moveZ -= 1;
        if (keys.right)    moveX += 1;
        if (keys.left)     moveX -= 1;
        if (keys.up)       moveY += 1;
        if (keys.down)     moveY -= 1;

        let next = current;

        // Déplacement horizontal avec glissement mural
        if (moveX !== 0 || moveZ !== 0) {
          _horizontal.set(0, 0, 0);
          if (moveX !== 0) _horizontal.addScaledVector(_right,     moveX);
          if (moveZ !== 0) _horizontal.addScaledVector(_direction, moveZ);
          _horizontal.normalize().multiplyScalar(MOVE_SPEED * delta);
          next = tryMoveAxis(next, "x", _horizontal.x);
          next = tryMoveAxis(next, "z", _horizontal.z);
        }

        // Déplacement vertical
        if (moveY !== 0) {
          next = tryMoveAxis(next, "y", moveY * VERTICAL_SPEED * delta);
        }

        obj.position.copy(next);
      }

      // Affichage position (référence mise en cache, pas de getElementById)
      const p = controls.getObject().position;
      cameraPosDiv.innerText = `x: ${p.x.toFixed(2)}, y: ${p.y.toFixed(2)}, z: ${p.z.toFixed(2)}`;

      // Affichage FPS (mis à jour toutes les secondes)
      fpsFrameCount++;
      const now = performance.now();
      const elapsed = now - fpsLastTime;
      if (elapsed >= 1000) {
        fpsDiv.innerText = `FPS : ${Math.round(fpsFrameCount * 1000 / elapsed)}`;
        fpsFrameCount = 0;
        fpsLastTime   = now;
      }

      renderer.render(scene, camera);
    }

    // ─── Resize ──────────────────────────────────────────────────────────────

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>
